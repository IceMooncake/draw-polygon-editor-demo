<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polygon Editor Demo</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        #image-wrapper {
            width: 800px;
            height: 600px;
            background-color: #f0f0f0;
            border: 2px solid #ccc;
        }
        #image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .sidebar {
            width: 600px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
        }
        button {
            margin: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
        #output {
            white-space: pre-wrap;
            font-family: monospace;
            background: #333;
            color: #fff;
            padding: 10px;
            height: 454px;
            overflow: auto;
        }
    </style>
</head>
<body>

    <h1>Draw-Polygon Demo</h1>
    
    <div class="container">
        <div id="image-wrapper">
             <img src="./example.jpg" alt="Placeholder">
        </div>

        <div class="sidebar">
            <div class="controls">
                <h3>工具 (Tools):</h3>
                <button id="btn-polygon">多边形 (Polygon)</button>
                <button id="btn-rect">矩形 (Rectangle)</button>
                <button id="btn-edit">编辑 (Edit)</button>
                <h3>操作 (Actions):</h3>
                <button id="btn-undo">撤销 (Undo)</button>
                <button id="btn-redo">重做 (Redo)</button>
                <button id="btn-reset">重置 (Reset)</button>
                <button id="btn-get">获取数据 (Get Data)</button>
            </div>
            <h3>输出日志 (Output Log):</h3>
            <div id="output">...waiting...</div>
        </div>
    </div>
    
    <script type="module">
        import { PolygonEditor } from './dist/index.js';

        const wrapper = document.getElementById('image-wrapper');
        const output = document.getElementById('output');
        
        // Buttons
        const btnPolygon = document.getElementById('btn-polygon');
        const btnRect = document.getElementById('btn-rect');
        const btnEdit = document.getElementById('btn-edit');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const btnReset = document.getElementById('btn-reset');
        const btnGet = document.getElementById('btn-get');

        function log(msg) {
            output.textContent = msg + '\n' + output.textContent;
        }

        // init editor
        const editor = new PolygonEditor(wrapper, {
            lineDash: [4, 4],
            strokeColor: [
              '#e74c3c', // Red
              '#3498db', // Blue
              '#2ecc71', // Green
              '#f1c40f', // Yellow
              '#9b59b6', // Purple
            ],
            pointRadius: 4
        });

        // Set default tool
        editor.setTool('polygon');
        log('[Init] Editor initialized. Default tool: Polygon');

        // Listen to events
        editor.setOnComplete((polygons) => {
            log(`[Event] Polygon Completed. Total polygons: ${polygons.length}`);
        });

        // Tool switching
        btnPolygon.onclick = () => {
            editor.setTool('polygon');
            log('[Tool] Switched to Polygon Tool');
        };

        btnRect.onclick = () => {
            editor.setTool('rectangle');
            log('[Tool] Switched to Rectangle Tool');
        };

        btnEdit.onclick = () => {
            editor.setTool('edit');
            log('[Tool] Switched to Edit Tool');
        };

        // Actions
        btnUndo.onclick = () => {
            editor.undo();
            log('[Action] Undo');
        };

        btnRedo.onclick = () => {
            editor.redo();
            log('[Action] Redo');
        };

        btnReset.onclick = () => {
             editor.reset();
             log('[Action] Canvas reset');
        };

        btnGet.onclick = () => {
            const polys = editor.getPolygons();
            log(`[Data] Current polygons: ${polys.length} polygons.\n`);
            log(JSON.stringify(polys, null, 2));
        };

        log('Instructions:\n- Polygon Tool: Click to add points. Click start point to close.\n- Rectangle Tool: Drag to create.\n- Edit Tool: Drag points to move. Ctrl+Click on edge to add point.\n- Shortcuts: Ctrl+Z (Undo), Ctrl+Y (Redo)');
    </script>
</body>
</html>
